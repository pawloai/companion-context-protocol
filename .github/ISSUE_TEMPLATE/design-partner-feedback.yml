name: Design-partner feedback
description: Capture review feedback from a prospective implementer or design partner.
title: "[Partner feedback]: "
labels:
  - partner-feedback
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Please avoid including confidential business data, real customer data, pet medical records, staff notes, billing details, secrets, or credentials.
  - type: input
    id: org_type
    attributes:
      label: Organization type
      placeholder: Pet retailer, boarding operator, vet-adjacent software, agent tooling, etc.
    validations:
      required: true
  - type: dropdown
    id: would_implement
    attributes:
      label: Would implement the Commerce Context Profile?
      options:
        - "Yes"
        - "Maybe"
        - "No"
        - "Not sure yet"
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Preferred integration surface
      options:
        - JSON Schema
        - OpenAPI/HTTP
        - MCP tools
        - TypeScript package
        - Python package
        - Not sure
    validations:
      required: false
  - type: textarea
    id: blockers
    attributes:
      label: Blocking issues
      description: What would prevent implementation?
    validations:
      required: false
  - type: textarea
    id: missing_context
    attributes:
      label: Missing context
      description: What field, object, scope, or purpose is missing?
    validations:
      required: false
  - type: textarea
    id: safety
    attributes:
      label: Privacy or safety concerns
      description: What feels too sensitive, unclear, or risky?
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
    validations:
      required: false
