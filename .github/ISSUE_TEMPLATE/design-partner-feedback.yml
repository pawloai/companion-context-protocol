name: Design-partner feedback
description: Capture review feedback from a prospective implementer or design partner.
title: "[Partner feedback]: "
labels:
  - partner-feedback
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Please avoid including confidential business data, real customer data, pet medical records, staff notes, billing details, secrets, or credentials.
  - type: input
    id: org_type
    attributes:
      label: Organization type
      placeholder: Pet retailer, boarding operator, vet-adjacent software, agent tooling, etc.
    validations:
      required: true
  - type: dropdown
    id: profile
    attributes:
      label: Profile or slice reviewed
      options:
        - Commerce Context Profile
        - Care Facility boarding-preparation slice
        - Care Facility pickup-verification slice
        - Care Network Lookup slice
        - Facility Truth Profile
        - Multiple
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: would_implement
    attributes:
      label: Would implement the reviewed profile or slice?
      options:
        - "Yes"
        - "Maybe"
        - "No"
        - "Not sure yet"
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Preferred integration surface
      options:
        - JSON Schema
        - OpenAPI/HTTP
        - MCP tools
        - TypeScript package
        - Python package
        - Not sure
    validations:
      required: false
  - type: textarea
    id: blockers
    attributes:
      label: Blocking issues
      description: What would prevent implementation?
    validations:
      required: false
  - type: textarea
    id: missing_context
    attributes:
      label: Missing context
      description: What field, object, scope, or purpose is missing?
    validations:
      required: false
  - type: textarea
    id: care_facility_open_decisions
    attributes:
      label: Care Facility open-decision feedback
      description: If reviewing Care Facility, comment on facility_shareable, grant_id, service_id, emergency contacts, and vaccination status values.
    validations:
      required: false
  - type: textarea
    id: facility_truth_open_decisions
    attributes:
      label: Facility Truth open-decision feedback
      description: If reviewing Facility Truth, comment on the facility-public visibility rule, the verified_at freshness requirement, the eight-scope public-fact set, the no-grant semantics for v1, and which deferred partner-only scopes (certifications, insurance statements, capacity status, staff credentials) you would need next.
    validations:
      required: false
  - type: textarea
    id: safety
    attributes:
      label: Privacy or safety concerns
      description: What feels too sensitive, unclear, or risky?
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
    validations:
      required: false
